name: Stock Monitor

on:
  schedule:
    - cron: '*/1 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 確保有寫入權限
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install pandas requests

      - name: Run script
        run: python main.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          
          # 使用萬用字元加入所有 csv 檔案，這樣以後新增檔案也不需再修改這段
          if ls *.csv >/dev/null 2>&1; then
            git add *.csv
            git commit -m "Update inventory - $(date '+%Y-%m-%d %H:%M:%S')" && git push || echo "No changes to commit"
          else
            echo "No CSV files to commit"
          fi
