name: Stock Monitor

on:
  schedule:
    - cron: '*/1 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 確保有寫入權限
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install pandas requests

      - name: Run script
        run: python main.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          
          # 同時 add 報告檔與基準紀錄檔
          if [ -f "inventory_report.csv" ] || [ -f "last_inventory.txt" ]; then
            git add inventory_report.csv last_inventory.txt
            git commit -m "Update inventory - $(date '+%Y-%m-%d %H:%M:%S')" && git push || echo "No changes to commit"
          fi
