name: Stock Monitor

on:
  schedule:
    # 這裡設定每 1 分鐘觸發一次 (cron 語法)
    - cron: '*/1 * * * *'
  workflow_dispatch: # 允許你手動點擊按鈕運行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        run: python main.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          
          # 檢查檔案是否存在
          if [ -f inventory_report.csv ]; then
            git add inventory_report.csv
            # 如果有變動才提交，否則跳過
            git commit -m "Update inventory report" && git push || echo "No changes to commit"
          else
            echo "File not found, skipping commit."
          fi
          # 如果沒有變動，這行會忽略錯誤
          git commit -m "Update inventory report" || echo "No changes"
          git push
